<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจสอบข้อมูล StoreData</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .tab-active { border-bottom: 3px solid #10B981; color: #10B981; font-weight: bold; background-color: #f9fafb; }
    .loader { border-top-color: #10B981; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .hl-stock { background-color: #fee2e2; color: #b91c1c; font-weight: 700; } 
    .hl-ps { background-color: #fef3c7; color: #d97706; font-weight: 700; } 
    th.cursor-pointer:hover { background-color: #374151; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden transition-opacity" onclick="toggleAdmin()"></div>

  <div id="adminSidebar" class="fixed inset-y-0 right-0 w-80 max-w-[80vw] bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
    <div class="p-4 flex justify-between items-center border-b bg-gray-50">
      <h2 class="text-lg font-bold text-gray-700">⚙️ Admin Mode</h2>
      <button onclick="toggleAdmin()" class="text-gray-400 hover:text-red-500 font-bold text-2xl focus:outline-none">&times;</button>
    </div>
    <div class="p-5 flex-1 overflow-y-auto">
      <h3 class="font-bold text-red-600 mb-4 text-sm">อัปโหลดไฟล์ .xlsx เพื่อแทนที่ข้อมูลชีต StoreData</h3>
      <div class="flex flex-col gap-4">
        <input type="file" id="excelFileInput" accept=".xlsx, .xls" class="border border-gray-300 p-2 rounded w-full text-sm">
        <button onclick="uploadExcelFile()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded font-medium w-full transition shadow-sm">
          📤 อัปโหลดและแทนที่
        </button>
      </div>
      <p id="uploadStatus" class="mt-4 text-sm font-medium"></p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 rounded-lg shadow-sm mb-4 border-l-4 border-blue-500">
      <div>
        <h1 id="reportDateDisplay" class="text-xl md:text-2xl font-bold text-gray-800">กำลังโหลดข้อมูลวันที่...</h1>
        <p id="branchInfo" class="text-blue-600 font-medium mt-1 text-lg">กำลังโหลดข้อมูลสาขา...</p>
      </div>
      </div>

    <div id="loading" class="flex justify-center my-12 hidden">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>

    <div id="mainContent" class="hidden bg-white rounded-lg shadow-sm overflow-hidden border border-gray-200">
      
      <div class="flex border-b bg-gray-50 flex-wrap">
        <button onclick="switchTab('top100')" id="tabTop100" class="flex-1 py-3 px-2 text-center tab-active transition hover:bg-gray-100 text-sm md:text-base">
          ⭐ TOP 100 สาขา
        </button>
        <button onclick="switchTab('zeroStock')" id="tabZeroStock" class="flex-1 py-3 px-2 text-center text-gray-500 transition hover:bg-gray-100 text-sm md:text-base border-l">
          📦 สินค้าสต็อค 0
        </button>
        <button onclick="switchTab('negativeStock')" id="tabNegativeStock" class="flex-1 py-3 px-2 text-center text-gray-500 transition hover:bg-gray-100 text-sm md:text-base border-l">
          ⚠️ สต็อคติดลบ
        </button>
      </div>

      <div class="p-4 md:p-6 bg-white">
        <div id="summaryDashboard" class="mb-6"></div>

        <div class="overflow-x-auto border rounded-lg shadow-sm">
          <table class="min-w-full text-left bg-white whitespace-nowrap">
            <thead class="bg-gray-800 text-white select-none">
              <tr>
                <th class="p-3 text-sm font-semibold cursor-pointer transition" onclick="sortData('barcode')">
                  บาร์โค้ด <span id="sortIcon-barcode" class="text-gray-400 text-xs">↕️</span>
                </th>
                <th class="p-3 text-sm font-semibold w-1/3 cursor-pointer transition" onclick="sortData('name')">
                  ชื่อสินค้า <span id="sortIcon-name" class="text-gray-400 text-xs">↕️</span>
                </th>
                <th class="p-3 text-sm font-semibold cursor-pointer transition" onclick="sortData('groupName')">
                  แผนก (GROUP) <span id="sortIcon-groupName" class="text-gray-400 text-xs">↕️</span>
                </th>
                <th class="p-3 text-sm font-semibold text-center cursor-pointer transition" onclick="sortData('status')">
                  Status <span id="sortIcon-status" class="text-gray-400 text-xs">↕️</span>
                </th>
                <th class="p-3 text-sm font-semibold text-center border-l border-gray-600 cursor-pointer transition" onclick="sortData('psValue')">
                  ค่า PS <span id="sortIcon-psValue" class="text-gray-400 text-xs">↕️</span>
                </th>
                <th class="p-3 text-sm font-semibold text-center border-l border-gray-600 cursor-pointer transition" onclick="sortData('stock')">
                  สต็อค <span id="sortIcon-stock" class="text-gray-400 text-xs">↕️</span>
                </th>
                <th class="p-3 text-sm font-semibold border-l border-gray-600 cursor-pointer transition" onclick="sortData('reason')">
                  สาเหตุ <span id="sortIcon-reason" class="text-gray-400 text-xs">↕️</span>
                </th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y text-sm text-gray-700"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbw8kJBY5wA9vZyquYcrOse0KhJTDJOghHrJCYDbJ3wNzI1UlxnejImRNZMe-8Uq1JnZ/exec'; 
    let apiResponse = null;
    let currentTab = 'top100';
    let currentDept = 'All'; 
    let sortConfig = { key: null, direction: 'asc' };

    window.onload = () => fetchStoreData();

    async function fetchStoreData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('mainContent').classList.add('hidden');
      document.getElementById('branchInfo').innerText = "กำลังโหลดข้อมูล...";
      
      try {
        const response = await fetch(`${API_URL}?action=getData`, { redirect: 'follow' });
        const result = await response.json();
        
        if (result.status === 'success') {
          apiResponse = result;
          const bInfo = result.branch;
          
          document.getElementById('reportDateDisplay').innerText = result.reportDate || "ข้อมูลวันที่ (ไม่ระบุ)";
          
          // ใส่ tag span ที่สามารถคลิกได้เข้าไปที่ รหัสสาขา เพื่อเปิด Admin Mode
          document.getElementById('branchInfo').innerHTML = `<span class="cursor-pointer hover:underline hover:text-red-600" title="คลิกเพื่อจัดการข้อมูล" onclick="toggleAdmin()">รหัสสาขา: ${bInfo.code || '-'}</span> | ชื่อสาขา: ${bInfo.name || '-'}`;
          
          document.getElementById('mainContent').classList.remove('hidden');
          switchTab('top100'); 
        } else {
          alert('เกิดข้อผิดพลาด: ' + result.message);
        }
      } catch (error) {
        alert('ไม่สามารถเชื่อมต่อ API ได้ (กรุณาเช็ค URL หรืออัปเดต Deployment)');
        document.getElementById('branchInfo').innerText = "เชื่อมต่อล้มเหลว";
        document.getElementById('reportDateDisplay').innerText = "เกิดข้อผิดพลาด";
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function switchTab(tabName) {
      if (!apiResponse) return;
      currentTab = tabName;
      currentDept = 'All'; 
      sortConfig = { key: null, direction: 'asc' }; 

      ['top100', 'zeroStock', 'negativeStock'].forEach(t => {
        const el = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);
        if (t === tabName) {
          el.className = 'flex-1 py-3 px-2 text-center tab-active transition hover:bg-gray-100 text-sm md:text-base';
        } else {
          el.className = 'flex-1 py-3 px-2 text-center text-gray-500 transition hover:bg-gray-100 text-sm md:text-base border-l';
        }
      });

      renderDashboard();
      updateSortIcons();
      renderTable();
    }

    function filterByDept(deptName) {
      currentDept = deptName;
      renderDashboard(); 
      renderTable();     
    }

    function sortData(key) {
      if (sortConfig.key === key) {
        sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortConfig.key = key;
        sortConfig.direction = 'asc';
      }
      updateSortIcons();
      renderTable();
    }

    function updateSortIcons() {
      const columns = ['barcode', 'name', 'groupName', 'status', 'psValue', 'stock', 'reason'];
      columns.forEach(col => {
        const icon = document.getElementById(`sortIcon-${col}`);
        if (icon) {
          if (sortConfig.key === col) {
            icon.innerText = sortConfig.direction === 'asc' ? ' 🔼' : ' 🔽';
            icon.className = 'text-green-400 text-xs ml-1';
          } else {
            icon.innerText = ' ↕️';
            icon.className = 'text-gray-400 text-xs ml-1';
          }
        }
      });
    }

    function renderDashboard() {
      const data = apiResponse.data[currentTab];
      const dashArea = document.getElementById('summaryDashboard');
      let html = '';

      const getDeptBadges = (summaryObj) => {
        let badgesHtml = `<button onclick="filterByDept('All')" class="px-3 py-1 rounded shadow-sm border text-sm transition ${currentDept === 'All' ? 'bg-blue-600 text-white font-bold border-blue-600' : 'bg-white text-gray-700 hover:bg-gray-100'}">ทั้งหมด</button>`;
        
        badgesHtml += Object.entries(summaryObj).map(([dept, count]) => {
          const safeDept = dept.replace(/'/g, "\\'");
          const isActive = currentDept === dept;
          const btnClass = isActive ? 'bg-blue-600 text-white font-bold border-blue-600' : 'bg-white text-gray-700 hover:bg-gray-100';
          const countClass = isActive ? 'text-blue-200' : 'text-blue-600';
          
          return `<button onclick="filterByDept('${safeDept}')" class="px-3 py-1 rounded shadow-sm border text-sm whitespace-nowrap transition ${btnClass}">
            ${dept}: <span class="font-bold ${countClass}">${count}</span>
          </button>`;
        }).join('');
        
        return badgesHtml || '<span class="text-gray-500">ไม่มีข้อมูล</span>';
      };

      if (currentTab === 'top100') {
        html = `
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-indigo-50 rounded-lg p-4 border border-indigo-200 shadow-sm text-center flex flex-col justify-center">
              <h4 class="text-sm text-indigo-700 font-bold">รายการ TOP100 ทั้งหมด</h4>
              <p class="text-3xl font-black text-indigo-800 mt-2">${data.total}</p>
            </div>
            <div class="bg-red-50 rounded-lg p-4 border border-red-200 shadow-sm text-center flex flex-col justify-center">
              <h4 class="text-sm text-red-700 font-bold">สินค้า OOS (สต็อค 0)</h4>
              <p class="text-3xl font-black text-red-600 mt-2">${data.oosCount}</p>
            </div>
            <div class="md:col-span-2 bg-blue-50 rounded-lg p-4 border border-blue-200 shadow-sm">
              <h4 class="text-sm text-blue-800 font-bold mb-3">คลิกเลือกแผนกเพื่อกรองข้อมูล (GROUP_NAME)</h4>
              <div class="flex flex-wrap gap-2 text-xs overflow-y-auto max-h-40">${getDeptBadges(data.summary)}</div>
            </div>
          </div>
        `;
      } 
      else if (currentTab === 'zeroStock') {
        // เปลี่ยนจาก reasonBreakdown เป็น deliveryBreakdown (DC/FDC)
        const deliveryHtml = Object.entries(data.deliveryBreakdown).map(([dlv, c]) => 
          `<div class="flex justify-between border-b border-gray-200 py-1"><span>${dlv}</span> <span class="font-bold text-red-600">${c}</span></div>`
        ).join('');

        html = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-gray-50 rounded-lg p-4 border shadow-sm text-center flex flex-col justify-center">
              <h4 class="text-sm text-gray-700 font-bold">สต็อค 0 ทั้งหมด</h4>
              <p class="text-4xl font-black text-gray-800 mt-2">${data.total}</p>
            </div>
            <div class="bg-red-50 rounded-lg p-4 border border-red-200 shadow-sm text-xs overflow-y-auto max-h-40">
              <h4 class="font-bold text-red-800 mb-2 border-b border-red-200 pb-1">แยกตามการจัดส่ง (DC/FDC)</h4>
              ${deliveryHtml || '-'}
            </div>
            <div class="bg-blue-50 rounded-lg p-4 border border-blue-200 shadow-sm overflow-y-auto max-h-40">
              <h4 class="text-xs text-blue-800 font-bold mb-3 border-b border-blue-200 pb-1">คลิกเลือกแผนกเพื่อกรอง</h4>
              <div class="flex flex-wrap gap-1 text-[10px]">${getDeptBadges(data.summary)}</div>
            </div>
          </div>
        `;
      } 
      else if (currentTab === 'negativeStock') {
        html = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-red-100 rounded-lg p-4 border border-red-300 shadow-sm text-center flex flex-col justify-center">
              <h4 class="text-sm text-red-800 font-bold">สินค้าสต็อคติดลบทั้งหมด</h4>
              <p class="text-3xl font-black text-red-700 mt-2">${data.total} <span class="text-base font-normal">รายการ</span></p>
            </div>
            <div class="md:col-span-2 bg-blue-50 rounded-lg p-4 border border-blue-200 shadow-sm">
              <h4 class="text-sm text-blue-800 font-bold mb-3">คลิกเลือกแผนกเพื่อกรองข้อมูล (GROUP_NAME)</h4>
              <div class="flex flex-wrap gap-2 text-xs overflow-y-auto max-h-40">${getDeptBadges(data.summary)}</div>
            </div>
          </div>
        `;
      }
      dashArea.innerHTML = html;
    }

    function renderTable() {
      let dataItems = [...apiResponse.data[currentTab].details];
      
      if (currentDept !== 'All') {
        dataItems = dataItems.filter(item => item.groupName === currentDept);
      }

      if (sortConfig.key) {
        dataItems.sort((a, b) => {
          let valA = a[sortConfig.key];
          let valB = b[sortConfig.key];
          
          if (sortConfig.key === 'stock' || sortConfig.key === 'psValue') {
            valA = parseFloat(valA) || 0;
            valB = parseFloat(valB) || 0;
          } else {
            valA = (valA || '').toString().toLowerCase();
            valB = (valB || '').toString().toLowerCase();
          }

          if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
          if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
          return 0;
        });
      }

      const tbody = document.getElementById('tableBody');
      
      if (dataItems.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-gray-400 font-medium">ไม่มีรายการในหมวดหมู่นี้</td></tr>`;
        return;
      }

      tbody.innerHTML = dataItems.map(item => `
        <tr class="hover:bg-gray-50 transition border-b">
          <td class="p-3 font-mono text-gray-500 text-xs">${item.barcode}</td>
          <td class="p-3 font-medium text-gray-900 truncate max-w-xs" title="${item.name}">${item.name}</td>
          <td class="p-3 text-gray-600">${item.groupName}</td>
          <td class="p-3 text-center font-bold text-gray-700">${item.status}</td>
          <td class="p-3 text-center border-l hl-ps">${item.psValue}</td>
          <td class="p-3 text-center border-l hl-stock">${item.stock}</td>
          <td class="p-3 text-xs text-red-600 max-w-xs truncate border-l" title="${item.reason}">${item.reason}</td>
        </tr>
      `).join('');
    }

    function toggleAdmin() {
      const sidebar = document.getElementById('adminSidebar');
      const overlay = document.getElementById('sidebarOverlay');
      
      if (sidebar.classList.contains('translate-x-full')) {
        sidebar.classList.remove('translate-x-full');
        overlay.classList.remove('hidden');
      } else {
        sidebar.classList.add('translate-x-full');
        overlay.classList.add('hidden');
      }
    }

    function uploadExcelFile() {
      const fileInput = document.getElementById('excelFileInput');
      const statusText = document.getElementById('uploadStatus');
      
      if (fileInput.files.length === 0) {
        alert('กรุณาเลือกไฟล์ .xlsx ก่อนอัปโหลด');
        return;
      }

      statusText.innerHTML = '<span class="text-blue-500">⏳ กำลังอ่านไฟล์ Excel กรุณารอสักครู่...</span>';
      const file = fileInput.files[0];
      const reader = new FileReader();
      
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const sheetName = workbook.SheetNames.includes('StoreData') ? 'StoreData' : workbook.SheetNames[0];
          const worksheet = workbook.Sheets[sheetName];
          const jsonDataArray = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
          
          statusText.innerHTML = '<span class="text-blue-500">☁️ กำลังส่งข้อมูลขึ้นระบบ (อาจใช้เวลา 10-20 วินาที)...</span>';
          sendDataToAppsScript(jsonDataArray);
        } catch (error) {
          statusText.innerHTML = `<span class="text-red-500">✗ เกิดข้อผิดพลาดในการอ่านไฟล์ Excel</span>`;
        }
      };
      reader.readAsArrayBuffer(file);
    }

    async function sendDataToAppsScript(dataArray) {
      const statusText = document.getElementById('uploadStatus');
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'upload', data: dataArray }),
          redirect: 'follow'
        });
        
        const result = await response.json();
        if (result.status === 'success') {
          statusText.innerHTML = `<span class="text-green-600 font-bold">✅ ${result.message}</span>`;
          setTimeout(() => {
            statusText.innerHTML = '';
            document.getElementById('excelFileInput').value = '';
            toggleAdmin(); 
            fetchStoreData();
          }, 1500);
        } else {
          statusText.innerHTML = `<span class="text-red-500">✗ ผิดพลาด: ${result.message}</span>`;
        }
      } catch (error) {
        statusText.innerHTML = `<span class="text-red-500">✗ เชื่อมต่อ API ล้มเหลว กรุณาตรวจสอบลิงก์ Web App</span>`;
      }
    }
  </script>
</body>
</html>
